<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industrial Attachment Report - Kipkorir Festus</title>

<style>
:root{
  --charcoal:#1f1f1f;
  --orange:#ff7a18;
  --light:#f4f6f8;
  --white:#ffffff;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--light);
  line-height:1.7;
  color:#222;
}

/* HEADER */
header{
  background:linear-gradient(135deg,var(--charcoal),#2c2c2c);
  color:white;
  text-align:center;
  padding:30px 15px;
}

header img{
  width:100px;
  animation:pop 1s ease;
}

@keyframes pop{
  from{transform:scale(0.5);opacity:0}
  to{transform:scale(1);opacity:1}
}

header h3{
  color:var(--orange);
}

button{
  background:var(--orange);
  border:none;
  padding:10px 18px;
  color:white;
  border-radius:6px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#e86a10;
  transform:scale(1.05);
}

/* NAV */
nav{
  position:sticky;
  top:0;
  background:var(--charcoal);
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  padding:10px;
  z-index:1000;
}

nav a{
  color:white;
  text-decoration:none;
  margin:8px 12px;
  transition:0.3s;
}

nav a:hover{
  color:var(--orange);
}

/* SECTIONS */
section{
  max-width:1000px;
  margin:20px auto;
  background:var(--white);
  padding:20px;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* DAY BOX */
.day{
  border-left:5px solid var(--orange);
  padding:10px 15px;
  margin:10px 0;
  background:#fafafa;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

.gallery div{
  background:#eee;
  padding:40px;
  text-align:center;
  border-radius:8px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:var(--charcoal);
  color:white;
}
</style>
</head>
